<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SameSTORY — Ler juntos, mesmo distantes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAF4EE;
      color: #1B2D4F;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .card { max-width: 420px; width: 100%; }

    .emoji { font-size: 72px; margin-bottom: 20px; }

    h1 {
      font-size: 32px;
      font-weight: 900;
      color: #1B2D4F;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 18px;
      color: #1A7A5E;
      font-weight: 700;
      margin-bottom: 20px;
    }

    p {
      font-size: 15px;
      color: #8D7E6E;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .botao {
      display: block;
      background: #1A7A5E;
      color: white;
      padding: 18px 32px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(26,122,94,0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">📖</div>
    <h1>SameSTORY</h1>
    <p class="tagline">Ler juntos, mesmo distantes.</p>
    <p>
      Pai lê em voz alta no celular.<br>
      Filho acompanha as imagens em tempo real.<br>
      Qualquer distância.
    </p>
    <a class="botao"
       href="https://play.google.com/store/apps/details?id=com.samestoryapp.app">
      Baixar na Play Store
    </a>
  </div>
</body>
</html>
